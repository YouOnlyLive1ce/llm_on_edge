params:
  huggingface_link: "user/model_name"
  
  pruning_method: "magnitude" # sparsegpt, wanda
  sparsity_ratio: 0.5
  sparsity_type: "unstructured" # 2:4, 4:8
  save: "./out/smollm2/unstructured/sparsegpt/"
  save_model: "./out/smollm2/unstructured/sparsegpt/"
  quantize_method: ["q4_0", "q8_0"] # 

stages:
  load_model:
    cmd: |
      python3 scripts/load_model.py --huggingface_link ${huggingface_link}
    outs: 
      - models/${huggingface_link}/base/config.json
      - models/${huggingface_link}/base/model.safetensors

  prune:
    cmd: |
      git clone https://github.com/locuslab/wanda.git || true
      cd wanda && python main.py \
        --model ${huggingface_link} \
        --prune_method ${pruning_method} \
        --sparsity_ratio ${sparsity_ratio} \
        --sparsity_type ${sparsity_type} \
        --save ${save} \
        --save_model ${save_model}
    deps: 
      - models/${huggingface_link}/base
    outs: 
      - ${save_model}

  setup_llama_cpp:
    cmd: |
      wget -q https://github.com/ggml-org/llama.cpp/releases/download/b7883/llama-b7883-bin-ubuntu-x64.tar.gz
      tar -xzf llama-b7883-bin-ubuntu-x64.tar.gz
      mv llama-b7883-bin-ubuntu-x64 llama.cpp
    outs:
      - llama.cpp/quantize

  convert_hf_to_gguf:
    cmd: |
      python llama.cpp/convert_hf_to_gguf.py ${save_model} \
        --outfile ${save_model}/smolm2-pruned.gguf \
        --outtype f16
    deps:
      - ${save_model}
      - llama.cpp/convert_hf_to_gguf.py
    outs:
      - ${save_model}/smolm2-pruned-q16.gguf

  quantize:
    for_each: quantize_method
    cmd: |
      ./llama.cpp/quantize \
        ${save_model}/smolm2-pruned.gguf \
        ${save_model}/smolm2-pruned.${item}.gguf \
        ${item}
    deps:
      - ${save_model}/smolm2-pruned.gguf
      - llama.cpp/quantize
    outs:
      - ${save_model}/smolm2-pruned.${item}.gguf

  benchmark:
    cmd: |
      python3 benchmark/benchmark.py \
        --model_dir ${save_model} \
        --output_dir benchmark/benchmark_results/${huggingface_link}
    deps:
      - ${save_model}/smolm2-pruned.q8_0.gguf
    outs:
      - benchmark/benchmark_results/${huggingface_link}